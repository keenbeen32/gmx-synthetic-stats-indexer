enum OrderStatus {
  Created
  Executed
  Cancelled
  Frozen
}

enum ClaimActionType {
  ClaimPriceImpact
  ClaimFunding
  SettleFundingFeeCreated
  SettleFundingFeeExecuted
  SettleFundingFeeCancelled
}

enum GlvOrMarketType {
  Glv
  Market
}

type AffiliateRewardUpdate {
  id: ID!
  affiliate: String!
  marketAddress: String!
  tokenAddress: String!
  delta: BigInt!
  nextValue: BigInt!
  nextPoolValue: BigInt!
  transaction: Transaction!
}

type Order {
  # orderKey
  id: ID!

  account: String!
  receiver: String!
  callbackContract: String!
  marketAddress: String!
  swapPath: [String!]
  initialCollateralTokenAddress: String!

  sizeDeltaUsd: BigInt!
  initialCollateralDeltaAmount: BigInt!
  triggerPrice: BigInt!
  acceptablePrice: BigInt!
  executionFee: BigInt!
  callbackGasLimit: BigInt!
  minOutputAmount: BigInt!

  updatedAtBlock: BigInt!

  orderType: BigInt!

  shouldUnwrapNativeToken: Boolean!
  isLong: Boolean!

  status: OrderStatus!

  cancelledReason: String
  cancelledReasonBytes: String
  frozenReason: String
  frozenReasonBytes: String

  createdTxn: Transaction!
  cancelledTxn: Transaction
  executedTxn: Transaction
}

type PositionIncrease {
  # orderKey
  id: ID!
  orderKey: String!
  positionKey: String!
  account: String!
  marketAddress: String!
  collateralTokenAddress: String!
  collateralTokenPriceMin: BigInt!
  collateralTokenPriceMax: BigInt!
  sizeInUsd: BigInt!
  sizeInTokens: BigInt!
  collateralAmount: BigInt!
  sizeDeltaUsd: BigInt!
  sizeDeltaInTokens: BigInt!
  collateralDeltaAmount: BigInt!
  executionPrice: BigInt!
  orderType: BigInt!
  borrowingFactor: BigInt!
  longTokenFundingAmountPerSize: BigInt!
  shortTokenFundingAmountPerSize: BigInt!
  priceImpactAmount: BigInt!
  priceImpactUsd: BigInt!
  isLong: Boolean!

  transaction: Transaction

  # TODO: no such field in PositionIncrease event
  priceImpactDiffUsd: BigInt!
  basePnlUsd: BigInt!
}

type PositionDecrease {
  # orderKey
  id: ID!
  orderKey: String!
  positionKey: String!
  account: String!
  marketAddress: String!
  collateralTokenAddress: String!
  collateralTokenPriceMin: BigInt!
  collateralTokenPriceMax: BigInt!
  sizeInUsd: BigInt!
  sizeInTokens: BigInt!
  collateralAmount: BigInt!
  sizeDeltaUsd: BigInt!
  sizeDeltaInTokens: BigInt!
  collateralDeltaAmount: BigInt!
  executionPrice: BigInt!
  priceImpactDiffUsd: BigInt!
  priceImpactUsd: BigInt!
  orderType: BigInt!
  borrowingFactor: BigInt!
  longTokenFundingAmountPerSize: BigInt!
  shortTokenFundingAmountPerSize: BigInt!
  priceImpactAmount: BigInt!
  basePnlUsd: BigInt!
  isLong: Boolean!

  transaction: Transaction
}

type PositionFeesInfo {
  # orderKey:eventName
  id: ID!
  eventName: String!
  orderKey: String!
  marketAddress: String!
  collateralTokenAddress: String!

  trader: String!
  affiliate: String!

  collateralTokenPriceMin: BigInt!
  collateralTokenPriceMax: BigInt!

  positionFeeAmount: BigInt!
  liquidationFeeAmount: BigInt
  borrowingFeeAmount: BigInt!
  fundingFeeAmount: BigInt!
  feeUsdForPool: BigInt!

  totalRebateFactor: BigInt!
  traderDiscountAmount: BigInt!
  totalRebateAmount: BigInt!
  affiliateRewardAmount: BigInt!

  transaction: Transaction!
}

type ClaimableCollateral {
  # account:market:token:timeKey
  id: ID!
  account: String!
  marketAddress: String!
  tokenAddress: String!
  timeKey: String!
  value: BigInt!
  claimed: Boolean!
  factor: BigInt!
  factorByTime: BigInt!

  # Envio: back-reference so ClaimableCollateralGroup.claimables can be @derivedFrom
  claimableCollateralGroup: ClaimableCollateralGroup
}

type ClaimableCollateralGroup {
  # market:token:timeKey
  id: ID!
  timeKey: String!
  marketAddress: String!
  tokenAddress: String!
  factor: BigInt!
  claimables: [ClaimableCollateral!]! @derivedFrom(field: "claimableCollateralGroup")
}

type SwapInfo {
  # orderKey:marketAddress
  id: ID!
  orderKey: String!
  receiver: String!
  marketAddress: String!
  tokenInAddress: String!
  tokenOutAddress: String!
  tokenInPrice: BigInt!
  tokenOutPrice: BigInt!
  amountIn: BigInt!
  amountInAfterFees: BigInt!
  amountOut: BigInt!
  priceImpactUsd: BigInt!

  transaction: Transaction!
}

type SwapFeesInfo {
  # eventId
  id: ID!
  marketAddress: String!
  tokenAddress: String!

  swapFeeType: String!

  tokenPrice: BigInt!
  feeReceiverAmount: BigInt!
  feeUsdForPool: BigInt!

  transaction: Transaction!
}

type CollectedMarketFeesInfo {
  # marketAddress:period:timestampGroup
  id: ID!
  period: String!
  marketAddress: String!
  feeUsdForPool: BigInt!
  cummulativeFeeUsdForPool: BigInt!
  feeUsdPerPoolValue: BigInt!
  cumulativeFeeUsdPerPoolValue: BigInt!
  feeUsdPerGmToken: BigInt!
  cumulativeFeeUsdPerGmToken: BigInt!
  prevCumulativeFeeUsdPerGmToken: BigInt!
